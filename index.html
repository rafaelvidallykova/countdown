<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d0e12;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 600px; }
        h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 10px; letter-spacing: -0.05em; }
        p.subtitle { color: #8a8f98; font-size: 1.1rem; margin-bottom: 40px; }
        .countdown { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .time-box {
            background: #16181d;
            border: 1px solid #24262f;
            border-radius: 12px;
            padding: 15px;
            min-width: 90px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .number { font-size: 2.5rem; font-weight: 700; font-variant-numeric: tabular-nums; display: block; color: #4f46e5; }
        .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #626770; margin-top: 5px; display: block; }
        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .countdown { gap: 8px; }
            .time-box { min-width: 75px; padding: 10px; }
            .number { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="main-title">Something exciting is coming</h1>
        <p class="subtitle" id="main-subtitle">We are working hard to bring you the next iteration. Stay tuned!</p>

        <div class="countdown">
            <div class="time-box"><span class="number" id="days">00</span><span class="label">Days</span></div>
            <div class="time-box"><span class="number" id="hours">00</span><span class="label">Hours</span></div>
            <div class="time-box"><span class="number" id="minutes">00</span><span class="label">Mins</span></div>
            <div class="time-box"><span class="number" id="seconds">00</span><span class="label">Secs</span></div>
        </div>
    </div>

    <script>
        const TIMEZONE = "Europe/Madrid";
        
        // Load configuration from LocalStorage, or use hardcoded defaults
        const TARGET_DATE_STR = localStorage.getItem('countdown_date') || "2026-12-31T00:00:00";
        const CUSTOM_TITLE = localStorage.getItem('countdown_title');
        const CUSTOM_SUBTITLE = localStorage.getItem('countdown_subtitle');

        if (CUSTOM_TITLE) document.getElementById('main-title').innerText = CUSTOM_TITLE;
        if (CUSTOM_SUBTITLE) document.getElementById('main-subtitle').innerText = CUSTOM_SUBTITLE;

        // Robust time-zone conversion helper
        function getMadridTargetTimestamp(dateStr) {
            // Create a pseudo-date using the input string
            const parts = dateStr.split(/[-T:]/);
            // Months are 0-indexed in JS Date constructor (January = 0)
            const targetDate = new Date(parts[0], parts[1] - 1, parts[2], parts[3], parts[4], parts[5] || 0);
            
            // Get the precise target date printed out in Madrid time
            const madridString = targetDate.toLocaleString('en-US', { timeZone: TIMEZONE });
            const madridDate = new Date(madridString);
            
            // Get the same target date printed out in your browser's local time
            const localString = targetDate.toLocaleString('en-US');
            const localDate = new Date(localString);
            
            // Find the offset gap between your local timezone and Madrid
            const diffOffset = localDate.getTime() - madridDate.getTime();
            
            // Return the universal execution timestamp adjusted for Madrid
            return targetDate.getTime() + diffOffset;
        }

        const targetTime = getMadridTargetTimestamp(TARGET_DATE_STR);

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetTime - now;

            if (difference <= 0) {
                document.querySelector('.container').innerHTML = "<h1>We're Live!</h1><p class='subtitle'>Welcome to our new site.</p>";
                clearInterval(intervalId);
                return;
            }

            // High-precision mathematical distributions for standard intervals
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Dynamically inject padded strings directly into the DOM
            document.getElementById("days").innerText = String(days).padStart(2, '0');
            document.getElementById("hours").innerText = String(hours).padStart(2, '0');
            document.getElementById("minutes").innerText = String(minutes).padStart(2, '0');
            document.getElementById("seconds").innerText = String(seconds).padStart(2, '0');
        }

        // Engage loop execution engine immediately
        updateCountdown();
        const intervalId = setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
